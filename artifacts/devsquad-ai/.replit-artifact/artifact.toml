kind = "web"
previewPath = "/"
title = "DevSquad AI"
version = "1.0.0"
id = "artifacts/devsquad-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20683

[services.development]
run = "pnpm --filter @workspace/devsquad-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devsquad-ai", "run", "build" ]
publicDir = "artifacts/devsquad-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20683"
BASE_PATH = "/"
